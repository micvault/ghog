<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Routine Builder Tool</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-100 min-h-screen p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        <div class="mb-8">
            <h1 class="text-3xl font-extrabold text-slate-900">Routine Builder</h1>
            <p class="text-slate-500 mt-2">Internal tool to generate formatted JSON files for your routines.</p>
        </div>

        <form id="builder-form" class="space-y-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-bold text-slate-800 mb-4 border-b pb-2">Routine Info</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">File ID (e.g., brosplit)</label>
                        <input type="text" id="r-id" class="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Routine Title</label>
                        <input type="text" id="r-title" class="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Description</label>
                        <input type="text" id="r-desc" class="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Difficulty</label>
                        <select id="r-diff" class="w-full p-2 border border-slate-300 rounded-md bg-white focus:ring-blue-500 focus:border-blue-500">
                            <option>Beginner</option>
                            <option>Intermediate</option>
                            <option>Advanced</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tags (comma separated)</label>
                        <input type="text" id="r-tags" placeholder="Hypertrophy, 4 Days, Dumbbells" class="w-full p-2 border border-slate-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold text-slate-800">Exercises</h2>
                    <button type="button" onclick="addExerciseRow()" class="bg-slate-800 text-white px-3 py-1 rounded-md text-sm hover:bg-slate-700 transition">+ Add Row</button>
                </div>
                
                <div id="exercises-container" class="space-y-6">
                    </div>
            </div>

            <div class="flex gap-4">
                <button type="button" onclick="generateAndDownloadJSON()" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-sm w-full md:w-auto">
                    Generate & Download JSON
                </button>
            </div>
        </form>
    </div>

    <script>
        let exerciseCount = 0;
        let availableImages = [];

        // 1. Fetch the image index when the builder loads
        async function fetchImageIndex() {
            try {
                const response = await fetch('exercisepreview/images-index.json');
                if (response.ok) {
                    availableImages = await response.json();
                } else {
                    console.warn("Could not load image index. Make sure exercisepreview/images-index.json exists.");
                }
            } catch (error) {
                console.error("Error fetching image index:", error);
            }
            
            // Add the first row AFTER images are loaded (so the dropdowns populate)
            addExerciseRow();
        }

        // 2. Generate the <option> tags for the dropdowns
        function getImageOptions() {
            let options = `<option value="https://via.placeholder.com/150?text=No+Image">Select an image...</option>`;
            availableImages.forEach(img => {
                // Remove 'exercisepreview/' for a cleaner display name, but keep full path for the value
                const displayName = img.replace('exercisepreview/', '');
                options += `<option value="${img}">${displayName}</option>`;
            });
            return options;
        }

        // 3. Inject a new exercise row
        function addExerciseRow() {
            exerciseCount++;
            const container = document.getElementById('exercises-container');
            const imgOptions = getImageOptions();
            
            const rowHtml = `
                <div class="p-4 bg-slate-50 border border-slate-200 rounded-xl relative exercise-row" id="ex-row-${exerciseCount}">
                    <button type="button" onclick="this.parentElement.remove()" class="absolute top-2 right-2 text-red-500 hover:text-red-700 text-sm font-bold">✕ Remove</button>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <h3 class="font-bold text-slate-700">Primary Workout</h3>
                            <div><input type="text" placeholder="Exercise Name (e.g., Pull-ups)" class="ex-p-name w-full p-2 text-sm border border-slate-300 rounded-md"></div>
                            <div><input type="text" placeholder="Details (e.g., 3 x 8 - 12)" class="ex-p-detail w-full p-2 text-sm border border-slate-300 rounded-md"></div>
                            <div>
                                <select class="ex-p-img w-full p-2 text-sm border border-slate-300 rounded-md bg-white">
                                    ${imgOptions}
                                </select>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <h3 class="font-bold text-slate-700">Alternative Workout</h3>
                            <div><input type="text" placeholder="Alt Name (e.g., Lat Pulldown)" class="ex-a-name w-full p-2 text-sm border border-slate-300 rounded-md"></div>
                            <div><input type="text" placeholder="Details (e.g., 3 x 8 - 12)" class="ex-a-detail w-full p-2 text-sm border border-slate-300 rounded-md"></div>
                            <div>
                                <select class="ex-a-img w-full p-2 text-sm border border-slate-300 rounded-md bg-white">
                                    ${imgOptions}
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', rowHtml);
        }

        // 4. Generate and Download JSON
        function generateAndDownloadJSON() {
            const idStr = document.getElementById('r-id').value || 'untitled';
            const rawTags = document.getElementById('r-tags').value;
            const tagsArray = rawTags ? rawTags.split(',').map(tag => tag.trim()) : [];

            const routineData = {
                id: idStr,
                title: document.getElementById('r-title').value,
                description: document.getElementById('r-desc').value,
                difficulty: document.getElementById('r-diff').value,
                tags: tagsArray,
                exercises: []
            };

            const rows = document.querySelectorAll('.exercise-row');
            rows.forEach(row => {
                const pName = row.querySelector('.ex-p-name').value;
                if (!pName) return; 

                routineData.exercises.push({
                    primary: {
                        name: pName,
                        detail: row.querySelector('.ex-p-detail').value,
                        image: row.querySelector('.ex-p-img').value
                    },
                    alternative: {
                        name: row.querySelector('.ex-a-name').value,
                        detail: row.querySelector('.ex-a-detail').value,
                        image: row.querySelector('.ex-a-img').value
                    }
                });
            });

            const jsonString = JSON.stringify(routineData, null, 2);
            const blob = new Blob([jsonString], { type: "application/json" });
            const url = URL.createObjectURL(blob);

            const a = document.createElement('a');
            a.href = url;
            a.download = `${idStr}.json`; 
            document.body.appendChild(a);
            a.click();
            
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Kick things off
        fetchImageIndex();
    </script>
</body>
</html>
